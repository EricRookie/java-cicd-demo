apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-demo
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-demo
  template:
    metadata:
      labels:
        app: java-demo
    spec:
      containers:
      - name: java-demo
        image: 192.168.10.10/cicd/java-demo:1
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: java-demo-svc
spec:
  type: NodePort
  selector:
    app: java-demo
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
